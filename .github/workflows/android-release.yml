name: Android APK

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        run: gradle :app:assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk StickerSaver-android-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StickerSaver-android-debug
          path: StickerSaver-android-debug.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: StickerSaver-android-debug.apk
          body: |
            Android debug APK for small-scale testing.

            Install notes:
            - Android may ask you to allow installing apps from unknown sources.
            - The app still needs a running StickerSaver server with a configured GIPHY_API_KEY.
            - For real-device testing, enter your LAN or deployed server address in the app.
