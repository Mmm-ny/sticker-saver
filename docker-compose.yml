services:
  sticker-server:
    build:
      context: ./server
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ALAPI_TOKEN: ${ALAPI_TOKEN:-}
      GIPHY_API_KEY: ${GIPHY_API_KEY}
      KLIPY_API_KEY: ${KLIPY_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4.1-mini}
      OPENAI_VISION_FALLBACK_MODEL: ${OPENAI_VISION_FALLBACK_MODEL:-gpt-4o-mini}
      BAIDU_API_KEY: ${BAIDU_API_KEY:-}
      BAIDU_SECRET_KEY: ${BAIDU_SECRET_KEY:-}
      STICKER_SERVER_HOST: 0.0.0.0
      STICKER_SERVER_PORT: 8080
